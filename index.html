<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Literário - Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="body-login">
    <div class="login-container">
        <h1>Boca do Inferno</h1>
        <h2>Cadastro do Professor</h2>
        <form id="form-cadastro">
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required placeholder="Seu nome">
            </div>
            <div class="input-group">
                <label for="professora">Professora</label>
                <input type="text" id="professora" required placeholder="Nome da professora">
            </div>
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="seuemail@escola.com">
            </div>
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" required placeholder="••••••••">
            </div>
            <div class="input-group">
                <label for="confirmar-senha">Confirmar Senha</label>
                <input type="password" id="confirmar-senha" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-main">Entrar no Blog</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
